name: INTIFALL CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ========================================
  # 门禁 1: 代码编译
  # ========================================
  build:
    name: Build Check
    runs-on: self-hosted
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unity Compile
        run: |
          "D:/unity/6000.0.2f1/Editor/Unity.exe" \
            -batchmode \
            -projectPath "E:/LevelDesign/Steal" \
            -quit \
            -logFile "build.log"
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}

      - name: Check Compilation Errors
        run: |
          if (Select-String -Path "build.log" -Pattern "error CS") {
            Write-Host "Compilation failed"
            Get-Content "build.log" | Select-String "error CS" | Select-Object -First 10
            exit 1
          }
          Write-Host "Compilation passed"

  # ========================================
  # 门禁 2: 单元测试 + 回归测试
  # ========================================
  test:
    name: Unit Tests
    runs-on: self-hosted
    needs: build
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run PlayMode Tests
        run: |
          "D:/unity/6000.0.2f1/Editor/Unity.exe" \
            -batchmode \
            -projectPath "E:/LevelDesign/Steal" \
            -runTests \
            -testResults "test-results.xml" \
            -testPlatform playmode \
            -logFile "test.log"
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}

      - name: Publish Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

      - name: Check Test Results
        run: |
          $content = Get-Content "test-results.xml" -Raw
          if ($content -match 'result="Failed"') {
            Write-Host "Tests failed - REGRESSION DETECTED"
            exit 1
          }
          if ($content -match 'result="Passed"') {
            $passed = [regex]::Match($content, 'passed="(\d+)"').Groups[1].Value
            Write-Host "All tests passed: $passed tests"
          }

  # ========================================
  # 门禁 3: 代码风格检查
  # ========================================
  style:
    name: Code Style
    runs-on: self-hosted
    needs: build
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check C# Style
        run: |
          $files = Get-ChildItem -Path "E:/LevelDesign/Steal/Assets/INTIFALL" -Filter "*.cs" -Recurse
          $errors = @()
          foreach ($f in $files) {
            $content = Get-Content $f.FullName -Raw
            # 检查: 命名规范 (字段以_开头)
            if ($content -match '\b(int|string|float|bool)\s+[A-Z]' -and $f.Name -notmatch "^I[A-Z]") {
              $errors += "$($f.Name): 字段应使用_前缀或camelCase"
            }
            # 检查: 空行结尾
            if ($content -notmatch "[^`r`n]`n$") {
              $errors += "$($f.Name): 文件末尾应有空行"
            }
            # 检查: tab vs space
            if ($content -match "    " -and $content -match "	") {
              $errors += "$($f.Name): 混用tab和空格"
            }
          }
          if ($errors.Count -gt 0) {
            Write-Host "Style issues found:"
            $errors | Select-Object -First 10
            exit 1
          }
          Write-Host "Code style check passed"

  # ========================================
  # 门禁 4: 测试覆盖率
  # ========================================
  coverage:
    name: Test Coverage
    runs-on: self-hosted
    needs: test
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Tests with Coverage
        run: |
          # 覆盖率需要特殊配置，这里仅做演示
          # 实际项目中可使用 Unity Coverage Dashboard
          $content = Get-Content "test-results.xml" -Raw
          $total = [regex]::Match($content, 'total="(\d+)"').Groups[1].Value
          $passed = [regex]::Match($content, 'passed="(\d+)"').Groups[1].Value
          $rate = [math]::Round(([int]$passed / [int]$total) * 100, 2)
          Write-Host "Test coverage: $rate% ($passed/$total)"
          if ($rate -lt 50) {
            Write-Host "Coverage too low: minimum 50% required"
            exit 1
          }
          Write-Host "Coverage check passed"

  # ========================================
  # 汇总: 所有门禁通过后
  # ========================================
  gate-pass:
    name: All Gates Passed
    runs-on: ubuntu-latest
    needs: [build, test, style, coverage]
    if: always()
    
    steps:
      - name: Check All Jobs
        run: |
          $build = "${{ needs.build.result }}"
          $test = "${{ needs.test.result }}"
          $style = "${{ needs.style.result }}"
          $coverage = "${{ needs.coverage.result }}"
          
          Write-Host "Build: $build"
          Write-Host "Test: $test"  
          Write-Host "Style: $style"
          Write-Host "Coverage: $coverage"
          
          if ($build -eq "failure" -or $test -eq "failure" -or $style -eq "failure" -or $coverage -eq "failure") {
            Write-Host "GATES FAILED - Code cannot be merged"
            exit 1
          }
          Write-Host "ALL GATES PASSED - Ready to merge"
