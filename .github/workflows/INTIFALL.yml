name: INTIFALL CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:
    inputs:
      testPlatform:
        description: Unity test platform
        required: false
        default: EditMode
        type: choice
        options:
          - EditMode
          - PlayMode
      unityExe:
        description: Optional Unity.exe path (overrides vars.UNITY_EXE)
        required: false
        type: string
      projectPath:
        description: Optional Unity project path (default repository root)
        required: false
        type: string

jobs:
  unity-tests:
    name: Unity ${{ github.event.inputs.testPlatform || vars.UNITY_TEST_PLATFORM || 'EditMode' }}
    runs-on: ${{ vars.UNITY_RUNNER || 'windows-latest' }}
    defaults:
      run:
        shell: powershell
    env:
      UNITY_PROJECT_PATH: ${{ github.event.inputs.projectPath || vars.UNITY_PROJECT_PATH || github.workspace }}
      UNITY_EXE: ${{ github.event.inputs.unityExe || vars.UNITY_EXE || '' }}
      UNITY_TEST_PLATFORM: ${{ github.event.inputs.testPlatform || vars.UNITY_TEST_PLATFORM || 'EditMode' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show effective configuration
        run: |
          Write-Host "UNITY_PROJECT_PATH=$env:UNITY_PROJECT_PATH"
          Write-Host "UNITY_TEST_PLATFORM=$env:UNITY_TEST_PLATFORM"
          if ([string]::IsNullOrWhiteSpace($env:UNITY_EXE)) {
            Write-Host "UNITY_EXE=<auto-detect in run-regression-tests.ps1>"
          } else {
            Write-Host "UNITY_EXE=$env:UNITY_EXE"
          }

      - name: Run regression tests
        run: |
          ./run-regression-tests.ps1 `
            -ProjectPath "$env:UNITY_PROJECT_PATH" `
            -UnityExe "$env:UNITY_EXE" `
            -TestPlatform "$env:UNITY_TEST_PLATFORM"

      - name: Upload Unity artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-test-artifacts-${{ github.run_number }}
          if-no-files-found: warn
          path: |
            ${{ env.UNITY_PROJECT_PATH }}/test-results-*.xml
            ${{ env.UNITY_PROJECT_PATH }}/test-*.log
            ${{ env.UNITY_PROJECT_PATH }}/codex-*.log
